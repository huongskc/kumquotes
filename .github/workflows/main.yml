name: KumQuotes CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - staging
      - main

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:${{ github.ref_name }}_${{ github.sha }}

jobs:
  build_web:
    name: Build Flutter Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.14.0
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: web-build-files
          path: build/web/
          retention-days: 1

  build_apk:
    name: Build APK file
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.14.0
        with:
          channel: 'stable'
          cache: true

      - name: Setup Java JDK
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'zulu' 
          java-version: '17'

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $KEYSTORE_BASE64 | base64 -d > android/app/release-keystore.jks

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK file
        env:
          KEYSTORE_PATH: "release-keystore.jks"
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: flutter build apk --release --build-name=1.0.0 --build-number=${{ github.run_number }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: apk-build-file
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 1
    
  dockerize:
    name: Build and Push Docker image
    needs: build_web
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Download Web Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: web-build-files
          path: build/web/

      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}

  deploy_local:
    name: Deploy to Local Ubuntu
    needs: build_web
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Stop and Remove Old Container
        run: |
          docker stop kumquotes-web || true
          docker rm kumquotes-web || true

      - name: Remove Old Images
        run: docker images -q ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }} | xargs -r docker rmi -f || true

      - name: Pull Image
        run: docker pull ${{ env.DOCKER_IMAGE }}

      - name: Run Container
        run: docker run --name kumquotes-web -dp 8888:80 ${{ env.DOCKER_IMAGE }}

  deploy_web_firebase:
    name: Deploy to Firebase
    needs: build_web
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Download Web Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: web-build-files
          path: build/web/

      - name: Install Firebase
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }}


  create_release:
    name: Create Github Release
    needs: build_apk
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions: 
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Download APK Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: apk-build-file
          path: downloaded-apk/

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "KumQuotes Release v1.0.${{ github.run_number }}"
          files: downloaded-apk/app-release.apk

  notify_discord:
    name: Send Message to Discord
    needs: create_release
    runs-on: ubuntu-latest
    steps:
      - name: Send Message
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "KumQuotes Newest Release!",
              "description": "Hiện KumQuotes đã có bản cập nhật mới. Hãy tải về và sử dụng nhé!!!",
              "color": 3066993,
              "fields": [
                { "name": "Phiên bản", "value": "v1.0.${{ github.run_number }}", "inline": true },
                { "name": "Tải file APK", "value": "[Truy cập trang tải GitHub Releases](https://github.com/${{ github.repository }}/releases/latest)", "inline": false }
              ],
              "footer": { "text": "Powered by GitHub Actions" }
            }]
          }' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}
