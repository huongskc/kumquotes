name: KumQuotes CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:${{ github.ref_name }}_${{ github.sha }}

jobs:
  build_web:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.14.0
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: web-build-files
          path: build/web/
          retention-days: 1

  build_apk:
    name: Build APK file
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.14.0
        with:
          channel: 'stable'
          cache: true

      - name: Setup Java JDK
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'zulu' 
          java-version: '17'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK file
        run: flutter build apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: apk-build-file
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 1
    
  dockerize:
    name: Build and Push Docker image
    needs: build_web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Download Web Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: web-build-files
          path: build/web/

      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}
          
  deploy_web:
    name: Deploy to Firebase
    needs: build_web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Download Web Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: web-build-files
          path: build/web/

      - name: Install Firebase
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }}

  upload_to_google_drive:
    name: Upload APK file to Google Drive
    needs: build_apk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Download APK Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: apk-build-file
          path: downloaded-apk/

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}'
          token_format: 'access_token'
          access_token_scopes: 'https://www.googleapis.com/auth/drive'

      - name: Upload APK to Google Drive
        run: |
          APK_FILE="downloaded-apk/app-release.apk"
          APK_NAME="${{ github.event.repository.name }}-${{ github.ref_name }}.apk"
          
          echo "{\"name\": \"${APK_NAME}\", \"parents\": [\"${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}\"]}" > /tmp/metadata.json
          
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            -F "metadata=@/tmp/metadata.json;type=application/json" \
            -F "file=@${APK_FILE};type=application/vnd.android.package-archive" \
            "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart")
            
          echo "Google API Response: $RESPONSE"
          
          DRIVE_FILE_ID=$(echo "$RESPONSE" | jq -r '.id')
            
          if [ -z "$DRIVE_FILE_ID" ] || [ "$DRIVE_FILE_ID" == "null" ]; then
            echo "Upload failed!"
            exit 1
          fi
          
          echo "Upload succeeded!"
          echo "File ID: ${DRIVE_FILE_ID}"
